<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bolex Case AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/dev/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #status {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 10px 12px;
      color: white;
      background: rgba(0,0,0,0.65);
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="status">Loading AR…</div>

  <a-scene embedded arjs renderer="colorManagement: true;">
    <a-assets>
      <a-asset-item id="bolexModel" src="model_bolex.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro" size="0.825" id="marker">
      <a-entity light="type: ambient; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; intensity: 1.5" position="1 2 1"></a-entity>

      <a-entity
        id="model"
        gltf-model="#bolexModel"
        position="0 0.5 0"
        rotation="0 0 0"
        scale="1 1 1">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
  const status = document.getElementById('status');
  const marker = document.getElementById('marker');
  const model = document.getElementById('model');
  const asset = document.getElementById('bolexModel');

  marker.addEventListener('markerFound', () => {
    status.textContent = 'Marker found';
  });

  marker.addEventListener('markerLost', () => {
    status.textContent = 'Marker lost';
  });

  asset.addEventListener('loaded', () => {
    console.log('asset loaded');
    status.textContent = 'GLB asset loaded';
  });

  asset.addEventListener('error', (e) => {
    console.error('asset error', e);
    status.textContent = 'GLB asset failed to load';
  });

  model.addEventListener('model-loaded', () => {
    const mesh = model.getObject3D('mesh');

    if (!mesh) {
      status.textContent = 'Model loaded but mesh not found';
      return;
    }

    const box = new THREE.Box3().setFromObject(mesh);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    console.log('original size:', size);
    console.log('original center:', center);

    // Recenter mesh so its true center sits on the marker origin
    mesh.position.x -= center.x;
    mesh.position.y -= center.y;
    mesh.position.z -= center.z;

    // Recompute after recentering
    const box2 = new THREE.Box3().setFromObject(mesh);
    const size2 = new THREE.Vector3();
    const min2 = new THREE.Vector3();
    box2.getSize(size2);
    box2.getMin(min2);

    console.log('recentered size:', size2);
    console.log('recentered min:', min2);

    // Set desired real-world width of the model
    // Change this to the width you want in meters
    const targetWidth = 0.2032; // 8 inches

    if (size2.x > 0) {
      const s = targetWidth / size2.x;
      model.object3D.scale.set(s, s, s);
      console.log('applied scale:', s);
    }

    // Put the bottom of the model on the marker plane
    model.object3D.position.set(0, -min2.y * model.object3D.scale.y, 0);

    status.textContent = 'Model centered and scaled';
  });

  model.addEventListener('model-error', (e) => {
    console.error('model error', e);
    status.textContent = 'Model failed to render';
  });
  </script>
</body>
</html>
