<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bolex Case AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    model-viewer {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #f5f5f5;
    }

    #arbutton {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 26px;
      background: #007aff;
      color: #fff;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 10;
    }

    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.9);
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="status">Loading model…</div>

  <model-viewer
    id="viewer"
    src="model.glb"
    ios-src="model_bolex.usdz"
    alt="Bolex case contents"
    camera-controls
    auto-rotate
    camera-orbit="45deg 65deg 120%"
    field-of-view="30deg"
    shadow-intensity="0.7"
    exposure="1"
    ar
    ar-scale="fixed"
    ar-modes="webxr scene-viewer quick-look"
    loading="eager">
  </model-viewer>

  <button id="arbutton" type="button">View in AR</button>

  <script>
    const viewer = document.getElementById('viewer');
    const button = document.getElementById('arbutton');
    const status = document.getElementById('status');

    viewer.addEventListener('load', () => {
      status.textContent = 'Model loaded';
    });

    viewer.addEventListener('error', (e) => {
      status.textContent = 'Model failed to load';
      console.error('model-viewer error:', e);
    });

    button.addEventListener('click', async () => {
      status.textContent = 'Opening AR…';
      viewer.orientation = '0deg 90deg 0deg';
      await viewer.updateComplete;
      viewer.activateAR();
    });
  </script>

</body>
</html>
