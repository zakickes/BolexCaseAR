<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bolex Case AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/dev/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #status {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 10px 12px;
      color: white;
      background: rgba(0,0,0,0.65);
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="status">Loading AR…</div>

<a-scene embedded arjs renderer="colorManagement: true;">

  <a-assets>
    <a-asset-item id="bolexModel" src="model_bolex.glb?v=13"></a-asset-item>
  </a-assets>

  <a-marker
    preset="hiro"
    size="0.083"
    smooth="true"
    smooth-count="5"
    smooth-tolerance="0.01"
    smooth-threshold="2"
    id="marker">

    <a-entity light="type: ambient; intensity: 1.5"></a-entity>
    <a-entity light="type: directional; intensity: 1.5" position="1 2 1"></a-entity>

    <a-entity
      id="rig"
      position="0 0 0"
      rotation="90 0 0"
      scale="12.05 12.05 12.05">

      <a-entity
        id="model"
        gltf-model="#bolexModel">
      </a-entity>

    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>

const status = document.getElementById('status');
const marker = document.getElementById('marker');
const model = document.getElementById('model');
const asset = document.getElementById('bolexModel');

marker.addEventListener('markerFound', () => {
  status.textContent = 'Marker found';
});

marker.addEventListener('markerLost', () => {
  status.textContent = 'Marker lost';
});

asset.addEventListener('loaded', () => {
  console.log('asset loaded');
  status.textContent = 'GLB asset loaded';
});

asset.addEventListener('error', (e) => {
  console.error('asset error', e);
  status.textContent = 'GLB asset failed to load';
});

model.addEventListener('model-loaded', (e) => {
  console.log('model loaded', e);
  status.textContent = 'Model loaded';
});

model.addEventListener('model-error', (e) => {
  console.error('model error', e);
  status.textContent = 'Model failed to render';
});

</script>

</body>
</html>
