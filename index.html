<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bolex Case AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/dev/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #status {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 10px 12px;
      color: white;
      background: rgba(0,0,0,0.65);
      border-radius: 8px;
      text-align: center;
      white-space: pre-line;
    }
  </style>
</head>

<body>
  <div id="status">Loading AR…</div>

  <a-scene embedded arjs renderer="colorManagement: true;">
    <a-assets>
      <a-asset-item id="bolexModel" src="model_bolex.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro" size="0.083" id="marker">
      <a-entity light="type: ambient; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; intensity: 1.5" position="1 2 1"></a-entity>

      <a-entity
        id="model"
        gltf-model="#bolexModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const status = document.getElementById('status');
    const marker = document.getElementById('marker');
    const model = document.getElementById('model');

    // SET THIS TO THE TRUE PHYSICAL WIDTH OF YOUR OBJECT
    // Example: 8.0 inches = 0.2032 m
    const REAL_MODEL_WIDTH_METERS = 0.2032;

    marker.addEventListener('markerFound', () => {
      status.textContent = 'Marker found';
    });

    marker.addEventListener('markerLost', () => {
      status.textContent = 'Marker lost';
    });

    model.addEventListener('model-loaded', () => {
      const mesh = model.getObject3D('mesh');

      if (!mesh) {
        status.textContent = 'Model loaded, but mesh not found';
        return;
      }

      // Reset any previous transforms so math is clean
      model.object3D.scale.set(1, 1, 1);
      model.object3D.position.set(0, 0, 0);

      // Measure native GLB size at scale 1
      const box = new THREE.Box3().setFromObject(mesh);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      // Center the mesh geometry around the model origin
      mesh.position.sub(center);

      // Recompute after recentering
      const box2 = new THREE.Box3().setFromObject(mesh);
      const size2 = new THREE.Vector3();
      const min2 = new THREE.Vector3();
      box2.getSize(size2);
      box2.getMin(min2);

      const nativeWidth = size2.x;
      const scaleFactor = REAL_MODEL_WIDTH_METERS / nativeWidth;

      model.object3D.scale.set(scaleFactor, scaleFactor, scaleFactor);

      // Put bottom of model on marker plane
      model.object3D.position.set(0, -min2.y * scaleFactor, 0);

      status.textContent =
        `Model loaded
Native width: ${nativeWidth.toFixed(6)}
Target width: ${REAL_MODEL_WIDTH_METERS.toFixed(6)} m
Scale factor: ${scaleFactor.toFixed(6)}`;
    });

    model.addEventListener('model-error', (e) => {
      console.error('model error', e);
      status.textContent = 'Model failed to render';
    });
  </script>
</body>
</html>
