<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Bolex Case AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto;
}
#info {
  position: absolute;
  bottom: 0;
  width: 100%;
  text-align: center;
  color: white;
  background: rgba(0,0,0,0.4);
  padding: 12px;
}
</style>
</head>

<body>

<div id="info">
Point your camera at the marker to view the case contents
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; detectionMode: mono_and_matrix;">

  <!-- Marker -->
  <a-marker preset="hiro">

    <!-- Your model -->
    <a-entity
      gltf-model="model.glb"
      position="0 0 0"
      rotation="-90 0 0"
      scale="0.2 0.2 0.2">
    </a-entity>

  </a-marker>

  <!-- camera -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
