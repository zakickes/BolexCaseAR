<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bolex Case AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #fff;
    }

    /* Keep model-viewer active, but invisible */
    model-viewer {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #arbutton {
      padding: 16px 28px;
      background: #007aff;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<model-viewer
  id="modelViewer"
  src="model.glb"
  ios-src="model_bolex.usdz"
  alt="Bolex 3D model"
  ar
  ar-scale="fixed"
  ar-modes="webxr scene-viewer quick-look"
  loading="eager">
</model-viewer>

<button id="arbutton">View in AR</button>

<script>
  const modelViewer = document.getElementById("modelViewer");
  const arButton = document.getElementById("arbutton");

  modelViewer.addEventListener("load", async () => {
    // Use the rotation that gave you the correct AR result
    modelViewer.orientation = "-90deg 0deg 0deg";
    await modelViewer.updateComplete;
  });

  arButton.addEventListener("click", async () => {
    await modelViewer.updateComplete;
    modelViewer.activateAR();
  });
</script>

</body>
</html>
